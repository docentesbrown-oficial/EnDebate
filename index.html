<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>La soledad del guardapolvo: cuando el aula se vuelve la última trinchera | Docentes Brown</title>
  <meta name="description" content="Una editorial sobre la soledad docente frente a la violencia, la orfandad institucional y la urgencia de reconstruir una red pública de cuidado." />
  <meta name="theme-color" content="#f4efe7" />
  <meta property="og:type" content="article" />
  <meta property="og:title" content="La soledad del guardapolvo: cuando el aula se vuelve la última trinchera" />
  <meta property="og:description" content="Una editorial sobre la soledad docente frente a la violencia, la orfandad institucional y la urgencia de reconstruir una red pública de cuidado." />
  <meta property="og:image" content="./portada-guardapolvo.webp" />
  <meta property="og:site_name" content="Docentes Brown" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #f5f1ea;
      --bg-2: #f7f4ef;
      --surface: rgba(255,255,255,.72);
      --surface-strong: rgba(255,255,255,.9);
      --border: rgba(36,73,110,.12);
      --text: #1d2731;
      --muted: #5d6772;
      --accent: #24496e;
      --accent-2: #da6863;
      --shadow: 0 24px 60px rgba(31,58,95,.12);
      --shadow-soft: 0 10px 26px rgba(31,58,95,.09);
      --radius-xl: 32px;
      --radius-lg: 24px;
      --radius-md: 18px;
      --content-width: 820px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(200,217,234,.68) 0%, rgba(245,241,234,0) 30%),
        radial-gradient(circle at top right, rgba(218,104,99,.12) 0%, rgba(245,241,234,0) 24%),
        linear-gradient(180deg, #f7f4ee 0%, #f3eee6 52%, #f7f4ef 100%);
      min-height: 100vh;
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    img { max-width: 100%; display: block; }
    button, input, textarea { font: inherit; }
    a { color: inherit; text-decoration: none; }

    .progress {
      position: fixed;
      inset: 0 0 auto;
      height: 4px;
      z-index: 60;
      background: rgba(255,255,255,.18);
      backdrop-filter: blur(10px);
    }

    .progress > span {
      display: block;
      width: 0;
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      box-shadow: 0 0 18px rgba(36,73,110,.35);
      transition: width .08s linear;
    }

    .page-shell {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 24px 0 90px;
    }

    .topbar {
      position: sticky;
      top: 16px;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 14px;
      margin-bottom: 26px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.58);
      backdrop-filter: blur(18px) saturate(1.15);
      -webkit-backdrop-filter: blur(18px) saturate(1.15);
      border-radius: 999px;
      box-shadow: var(--shadow-soft);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-mark {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      color: white;
      background: linear-gradient(135deg, var(--accent), #4d6f93);
      box-shadow: 0 14px 30px rgba(36,73,110,.26);
      flex-shrink: 0;
    }

    .brand-mark svg { width: 20px; height: 20px; }
    .brand-copy small {
      display: block;
      font-size: .74rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .brand-copy strong {
      display: block;
      font-size: .96rem;
      font-weight: 800;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .pill, .icon-btn, .menu-item, .comment-cta, .ghost-btn, .primary-btn, .comment-reply-btn {
      transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease, background .18s ease;
    }

    .pill:hover, .icon-btn:hover, .menu-item:hover, .comment-cta:hover, .ghost-btn:hover, .primary-btn:hover, .comment-reply-btn:hover {
      transform: translateY(-1px);
      box-shadow: var(--shadow-soft);
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface-strong);
      color: var(--accent);
      font-weight: 700;
      cursor: pointer;
    }

    .icon-btn {
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface-strong);
      color: var(--text);
      cursor: pointer;
    }

    .pill svg, .icon-btn svg, .menu-item svg, .share-fab svg, .comment-cta svg, .comment-reply-btn svg {
      width: 18px;
      height: 18px;
    }

    .hero {
      padding: 28px;
      border-radius: 36px;
      background: rgba(255,255,255,.62);
      border: 1px solid rgba(255,255,255,.55);
      box-shadow: var(--shadow);
      backdrop-filter: blur(15px) saturate(1.08);
      -webkit-backdrop-filter: blur(15px) saturate(1.08);
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(180deg, rgba(255,255,255,.25), rgba(255,255,255,.02));
    }

    .hero-grid {
      position: relative;
      z-index: 1;
      display: grid;
      gap: 22px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: .78rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      font-weight: 800;
      color: var(--accent);
      margin-bottom: 4px;
    }

    .eyebrow::before {
      content: "";
      width: 34px;
      height: 1px;
      background: rgba(36,73,110,.34);
    }

    .hero-text {
      width: 100%;
    }

    .hero-text h1 {
      margin: 0;
      width: 100%;
      max-width: none;
      font-family: "Newsreader", Georgia, serif;
      font-size: clamp(2.55rem, 4.8vw, 5.3rem);
      line-height: .95;
      letter-spacing: -.04em;
      color: #18212b;
      text-wrap: balance;
    }

    .dek {
      margin: 22px 0 0;
      width: 100%;
      max-width: none;
      font-size: clamp(1.06rem, 1rem + .3vw, 1.35rem);
      line-height: 1.55;
      color: var(--muted);
      text-wrap: pretty;
    }

    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 24px;
    }

    .meta-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,.76);
      border: 1px solid rgba(36,73,110,.10);
      color: #33404d;
      font-size: .92rem;
    }

    .feature-image-fullbleed {
      margin: 26px calc(50% - 50vw) 0;
      width: 100vw;
    }

    .feature-image-frame {
      position: relative;
      width: 100%;
      min-height: clamp(320px, 58vw, 880px);
      overflow: hidden;
      background: #e9eef3;
      box-shadow: 0 24px 50px rgba(36,73,110,.18);
    }

    .feature-image-frame::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(10,15,20,0) 30%, rgba(10,15,20,.18) 100%);
      pointer-events: none;
    }

    .hero-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
    }

    .image-caption {
      position: absolute;
      left: 18px;
      bottom: 18px;
      z-index: 1;
      max-width: calc(100% - 36px);
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,.78);
      backdrop-filter: blur(10px);
      font-size: .86rem;
      color: #44515e;
      border: 1px solid rgba(36,73,110,.10);
    }

    .content-wrap {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 280px;
      gap: 34px;
      margin-top: 28px;
      align-items: start;
    }

    .article-card {
      background: rgba(255,255,255,.62);
      border: 1px solid rgba(255,255,255,.54);
      border-radius: 32px;
      padding: 36px clamp(20px, 4vw, 48px) 44px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px) saturate(1.06);
      -webkit-backdrop-filter: blur(14px) saturate(1.06);
    }

    .lead-box {
      border-left: 3px solid var(--accent-2);
      padding: 10px 0 10px 18px;
      margin-bottom: 30px;
    }

    .lead-box p {
      margin: 0;
      font-size: 1.08rem;
      color: #46505c;
    }

    .article-body {
      width: min(var(--content-width), 100%);
    }

    .article-body p {
      margin: 0 0 1.45em;
      font-family: "Newsreader", Georgia, serif;
      font-size: clamp(1.18rem, 1.12rem + .25vw, 1.38rem);
      line-height: 1.8;
      color: #202a35;
      letter-spacing: -.008em;
    }

    .article-body p:first-child::first-letter {
      float: left;
      font-family: "Newsreader", Georgia, serif;
      font-size: 4.7em;
      line-height: .84;
      padding-right: 12px;
      padding-top: 8px;
      color: var(--accent);
    }

    .pull-quote {
      margin: 34px 0 36px;
      padding: 28px 24px;
      border-radius: 28px;
      background: linear-gradient(135deg, rgba(36,73,110,.10), rgba(218,104,99,.08));
      border: 1px solid rgba(36,73,110,.10);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.45);
    }

    .pull-quote p {
      margin: 0;
      font-family: "Newsreader", Georgia, serif;
      font-size: clamp(1.5rem, 1.15rem + 1vw, 2rem);
      line-height: 1.28;
      letter-spacing: -.025em;
      color: #18212b;
    }

    .section-break {
      display: flex;
      align-items: center;
      gap: 10px;
      color: rgba(36,73,110,.42);
      margin: 22px 0 28px;
    }

    .section-break::before,
    .section-break::after {
      content: "";
      height: 1px;
      background: rgba(36,73,110,.18);
      flex: 1;
    }

    .section-break span {
      font-size: .82rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      font-weight: 700;
    }

    .sidebar {
      position: sticky;
      top: 100px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .side-card {
      padding: 18px;
      border-radius: 24px;
      background: rgba(255,255,255,.66);
      border: 1px solid rgba(255,255,255,.55);
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .side-card h3 {
      margin: 0 0 8px;
      font-size: .98rem;
      line-height: 1.2;
    }

    .side-card p {
      margin: 0;
      font-size: .94rem;
      color: var(--muted);
      line-height: 1.55;
    }

    .share-stack {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }

    .menu-item {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.82);
      color: var(--text);
      cursor: pointer;
    }

    .comments-wrap {
      margin-top: 34px;
      padding-top: 26px;
      border-top: 1px solid rgba(36,73,110,.12);
    }

    .comments-toggle {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 18px;
      border-radius: 20px;
      border: 1px solid rgba(36,73,110,.12);
      background: rgba(255,255,255,.78);
      color: var(--accent);
      font-weight: 800;
      cursor: pointer;
      box-shadow: var(--shadow-soft);
    }

    .comments-toggle span {
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .comments-toggle svg {
      width: 18px;
      height: 18px;
      transition: transform .2s ease;
      flex-shrink: 0;
    }

    .comments-toggle[aria-expanded="true"] svg:last-child {
      transform: rotate(180deg);
    }

    .comments-panel {
      margin-top: 16px;
      padding: 20px;
      border-radius: 24px;
      background: rgba(255,255,255,.58);
      border: 1px solid rgba(255,255,255,.6);
      box-shadow: var(--shadow-soft);
    }

    .comments-header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 18px;
    }

    .comments-title {
      margin: 0;
      font-size: 1rem;
      color: #1f2933;
    }

    .comments-subtitle {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: .92rem;
    }

    .comment-cta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border-radius: 999px;
      border: 1px solid rgba(36,73,110,.12);
      background: linear-gradient(135deg, rgba(36,73,110,.98), rgba(77,111,147,.98));
      color: white;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 14px 30px rgba(36,73,110,.18);
    }

    .comments-list {
      display: grid;
      gap: 14px;
    }

    .empty-comments {
      margin: 0;
      padding: 18px;
      border-radius: 18px;
      background: rgba(255,255,255,.72);
      color: var(--muted);
      border: 1px dashed rgba(36,73,110,.18);
    }

    .comment-card {
      padding: 18px;
      border-radius: 20px;
      background: rgba(255,255,255,.84);
      border: 1px solid rgba(36,73,110,.10);
    }

    .comment-meta {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px 12px;
      margin-bottom: 10px;
    }

    .comment-author {
      font-weight: 800;
      color: #17222d;
    }

    .comment-date {
      font-size: .86rem;
      color: var(--muted);
    }

    .comment-text {
      margin: 0;
      font-size: 1rem;
      line-height: 1.65;
      color: #24303b;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .comment-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 14px;
    }

    .comment-reply-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      border-radius: 999px;
      border: 1px solid rgba(36,73,110,.12);
      background: rgba(255,255,255,.72);
      color: var(--accent);
      font-weight: 700;
      cursor: pointer;
    }

    .comment-children {
      margin-top: 14px;
      padding-left: 16px;
      border-left: 2px solid rgba(36,73,110,.10);
      display: grid;
      gap: 12px;
    }

    .comment-modal[hidden],
    .comments-panel[hidden] {
      display: none;
    }

    .comment-modal {
      position: fixed;
      inset: 0;
      z-index: 120;
      display: grid;
      place-items: center;
      padding: 18px;
      background: rgba(18,26,35,.42);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .comment-dialog {
      width: min(620px, 100%);
      padding: 22px;
      border-radius: 28px;
      background: rgba(255,255,255,.96);
      border: 1px solid rgba(255,255,255,.72);
      box-shadow: var(--shadow);
    }

    .comment-dialog-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    .comment-dialog h3 {
      margin: 0;
      font-size: 1.16rem;
      color: #17222d;
    }

    .comment-dialog p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: .94rem;
      line-height: 1.5;
    }

    .comment-form {
      display: grid;
      gap: 14px;
    }

    .comment-field {
      display: grid;
      gap: 8px;
    }

    .comment-field label {
      font-weight: 700;
      color: #22313f;
      font-size: .94rem;
    }

    .comment-field input,
    .comment-field textarea {
      width: 100%;
      border: 1px solid rgba(36,73,110,.14);
      border-radius: 16px;
      background: rgba(248,250,252,.92);
      padding: 14px 16px;
      color: var(--text);
      outline: none;
    }

    .comment-field input:focus,
    .comment-field textarea:focus {
      border-color: rgba(36,73,110,.36);
      box-shadow: 0 0 0 4px rgba(36,73,110,.08);
    }

    .comment-field textarea {
      min-height: 150px;
      resize: vertical;
    }

    .comment-form-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 4px;
    }

    .ghost-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 16px;
      border-radius: 999px;
      border: 1px solid rgba(36,73,110,.12);
      background: rgba(255,255,255,.86);
      color: var(--accent);
      font-weight: 700;
      cursor: pointer;
    }

    .primary-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 18px;
      border-radius: 999px;
      border: none;
      background: linear-gradient(135deg, var(--accent), #3e678c);
      color: white;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 16px 28px rgba(36,73,110,.20);
    }

    .footer-note {
      margin-top: 36px;
      padding-top: 18px;
      border-top: 1px solid rgba(36,73,110,.12);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      color: var(--muted);
      font-size: .92rem;
    }

    .back-top {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--accent);
      font-weight: 700;
    }

    .share-fab {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 70;
      border: none;
      width: 62px;
      height: 62px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      color: white;
      background: linear-gradient(135deg, var(--accent), #3e678c);
      box-shadow: 0 18px 34px rgba(36,73,110,.32);
      cursor: pointer;
      transition: transform .2s ease, box-shadow .2s ease;
    }

    .share-fab:hover { transform: translateY(-2px) scale(1.02); }

    .share-panel {
      position: fixed;
      right: 18px;
      bottom: 92px;
      z-index: 75;
      width: min(340px, calc(100vw - 24px));
      padding: 16px;
      border-radius: 26px;
      background: rgba(255,255,255,.84);
      border: 1px solid rgba(255,255,255,.64);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px) saturate(1.14);
      -webkit-backdrop-filter: blur(18px) saturate(1.14);
      transform: translateY(12px) scale(.98);
      opacity: 0;
      pointer-events: none;
      transition: opacity .22s ease, transform .22s ease;
    }

    .share-panel.open {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }

    .share-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 14px;
    }

    .share-head h4 {
      margin: 0 0 4px;
      font-size: 1rem;
    }

    .share-head p {
      margin: 0;
      color: var(--muted);
      font-size: .9rem;
      line-height: 1.4;
    }

    .share-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .status-note {
      margin: 0 0 14px;
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(36,73,110,.06);
      border: 1px solid rgba(36,73,110,.08);
      color: #42505e;
      font-size: .93rem;
      line-height: 1.5;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
      border: 0;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translate(-50%, 20px);
      z-index: 90;
      padding: 12px 16px;
      border-radius: 999px;
      background: rgba(24,33,43,.92);
      color: white;
      font-size: .92rem;
      box-shadow: 0 12px 30px rgba(0,0,0,.20);
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s ease, transform .2s ease;
    }

    .toast.show {
      opacity: 1;

  <script>
    const COMMENTS_API_URL = 'https://script.google.com/macros/s/AKfycbxx11eeX2YCBg9ad04958QmqRo1qQiglKtcMq_B_3ItyLqR8x1Pn3aRLfOzXLpU7lm9gA/exec';
    const NOTE_ID = 'la-soledad-del-guardapolvo';
    const ARTICLE_DATA = {"kicker": "Editorial · Escuela pública y cuidado", "title": "La soledad del guardapolvo: cuando el aula se vuelve la última trinchera", "summary": "Una editorial sobre la soledad docente frente a la violencia, la orfandad institucional y la urgencia de reconstruir una red pública de cuidado.", "author": "Docentes Brown", "date": "Abril 2026", "readTime": "7 min de lectura", "imageSrc": "./portada-guardapolvo.webp", "imageAlt": "Guardapolvo blanco colgado sobre una pared azul", "imageCaption": "La escuela pública también se sostiene cuidando a quienes la habitan todos los días.", "intro": "Lo que está pasando hoy en nuestras escuelas no solo nos preocupa; nos duele en una dimensión que a veces cuesta poner en palabras. En medio de la saturación informativa, de los debates apurados sobre estadísticas, de las promesas de gestión y de los diagnósticos livianos que circulan con facilidad, hay una realidad silenciosa que se espesa día tras día en los pasillos de nuestro país: la profunda soledad de los y las docentes frente a la violencia.", "body": ["No estamos hablando de un fenómeno aislado, ni de un episodio excepcional, ni de una simple “mala racha” en la convivencia escolar. Estamos frente a una crisis de los lazos sociales que encuentra en la escuela uno de sus escenarios más visibles, más sensibles y más expuestos. Y ahí aparece una de las cuestiones más inquietantes del presente: mientras la sociedad se fragmenta, mientras las instituciones pierden capacidad de contención y mientras el conflicto se multiplica sin respuestas de fondo, el docente ha quedado en una posición de primera línea que empieza a parecerse peligrosamente al abandono.", "No es solo la falta de recursos, aunque la precariedad material sea parte del problema y muchas veces su telón de fondo más persistente. No es solo el deterioro edilicio, la sobrecarga burocrática, los salarios insuficientes o la ausencia de equipos completos para acompañar situaciones complejas. Es algo todavía más corrosivo, más íntimo y más desgastante: la sensación de estar sosteniendo el peso de un sistema entero con las manos desnudas. La percepción cotidiana de que, ante el desborde, siempre hay un cuerpo docente disponible para absorber lo que nadie más logra tramitar.", "Esa soledad se manifiesta en escenas mínimas, aparentemente rutinarias, que sin embargo cambiaron de sentido. Una de ellas es el acto de cerrar la puerta del aula. Lo que antes representaba el inicio de un espacio de trabajo pedagógico, de encuentro, de cuidado y de construcción colectiva, hoy muchas veces se vive como un gesto defensivo, casi como una clausura. Del otro lado de esa puerta, el contexto empuja, irrumpe, exige, desborda. Y del lado de adentro, demasiadas veces, queda un docente intentando enseñar mientras también contiene, escucha, media, calma, previene, registra y resiste.", "La violencia, en sus múltiples formas —verbal, física, simbólica, institucional, vincular—, no llega a la escuela como algo ajeno. No entra desde afuera como si la institución pudiera mantenerse inmune a lo que sucede en la trama social. La escuela recibe, procesa y expresa muchas de las fracturas de una época. Allí impactan la desigualdad, la incertidumbre, la desorganización de los vínculos, el debilitamiento de referencias comunes, la intemperie material y subjetiva con la que llegan niñas, niños, adolescentes y también las propias familias. Lo preocupante es que, frente a ese cuadro, demasiadas veces el docente queda no solo expuesto, sino también responsabilizado en soledad por resolver lo que excede ampliamente su función.", "Y ahí aparece otra injusticia de nuestro tiempo: se le exige a la escuela que repare lo que la política pública no alcanza a contener, que organice lo que el tejido social deshilacha, que sostenga subjetividades heridas, que prevenga violencias estructurales y que, además, lo haga sin fisuras, sin cansancio y sin conflicto. Como si enseñar en estas condiciones no fuera ya una tarea de enorme complejidad. Como si la vocación pudiera reemplazar indefinidamente a las decisiones institucionales. Como si el compromiso docente debiera funcionar como un recurso infinito frente a todas las ausencias.", "Estamos, entonces, ante una verdadera orfandad institucional. Y esa orfandad no se resuelve solo con protocolos escritos desde un escritorio, ni con discursos formales sobre la convivencia, ni con declaraciones que reconocen los problemas pero no modifican las condiciones reales en las que se trabaja. Se resuelve con respaldo concreto, con presencia efectiva, con equipos interdisciplinarios suficientes, con tiempos institucionales cuidados, con formación situada, con decisiones políticas claras y, sobre todo, con la validación real de nuestra autoridad profesional. No podemos permitir que la vocación se convierta en un escudo humano contra la desidia.", "Porque cuando hablamos de autoridad docente, no estamos hablando de autoritarismo ni de nostalgia por modelos escolares cerrados. Hablamos de algo mucho más elemental y más democrático: del derecho de quienes enseñan a trabajar en condiciones de respeto, de ser escuchados, de contar con legitimidad institucional para intervenir, de no quedar solos frente a situaciones que ponen en tensión el sentido mismo de la escuela. Sin esa autoridad respaldada colectivamente, la tarea pedagógica se erosiona, el vínculo se debilita y la experiencia escolar empieza a vaciarse de horizonte.", "Desde este espacio siempre hemos sostenido que la institucionalidad es una garantía de la democracia. Pero esa institucionalidad no puede ser una estructura de hormigón que observa desde lejos mientras abajo todo arde. Tiene que ser un refugio dinámico, una presencia concreta, una red activa que acompañe, proteja y ordene. No alcanza con enunciar que la escuela importa: hay que demostrarlo cuidando a quienes la hacen posible todos los días.", "Sostener la escuela pública hoy no es solamente garantizar que los edificios estén en pie, que el calendario se cumpla o que las puertas permanezcan abiertas. Sostener la escuela pública es cuidar a quienes la habitan, la organizan y le dan sentido. Es comprender que no hay proyecto educativo posible si el trabajo docente se vuelve una experiencia de desgaste solitario. Es asumir que cuando un docente siente que está solo frente al desborde, no fracasa una persona ni un equipo en particular: retrocede el Estado, retrocede la comunidad y retrocede la idea misma de lo público como espacio de amparo y construcción común.", "También hay que animarse a decir algo más: la naturalización de esta soledad es una forma de violencia. Que un docente se acostumbre a convivir con el miedo, con la desprotección o con la incertidumbre permanente no puede transformarse en parte “normal” del trabajo. Que tenga que medir cada palabra, cada intervención o cada límite desde la lógica de la autopreservación tampoco es normal. Que deba volver a su casa cargando no solo planificación, correcciones y reuniones, sino además escenas de angustia, humillación o amenaza, no puede ser leído como un costo inevitable de la profesión.", "Por eso hay que romper el aislamiento. Y romperlo implica mucho más que expresar solidaridad en momentos de crisis. Implica reconstruir una conversación social honesta sobre qué escuela queremos, qué lugar le damos a quienes enseñan y qué responsabilidades estamos dispuestos a asumir colectivamente. Implica dejar de mirar al docente como un fusible siempre disponible para evitar que todo estalle. Implica entender que cuidar a la docencia no es defender un privilegio sectorial: es proteger una de las bases más importantes de cualquier sociedad democrática.", "No queremos negar lo que nos pasa. No queremos taparlo con eufemismos ni con frases hechas. El primer acto de resistencia política sigue siendo nombrar la realidad. Reconocer que nos duele, que nos cansa, que nos preocupa y que muchas veces nos desborda no es un gesto de debilidad; es el punto de partida para dejar de sostener todo en soledad y empezar a reconstruir, nuevamente, una red comunitaria, institucional y política que esté a la altura del momento.", "La soledad del guardapolvo no es un destino inevitable. Es una señal de alarma. Una advertencia. Un llamado urgente a revisar prioridades, a asumir responsabilidades y a recuperar la densidad colectiva que la escuela necesita para seguir siendo mucho más que un lugar al que se va a cumplir horario. Porque si cada docente entra a su escuela sintiendo que entra solo a una batalla que no pidió librar, entonces lo que está en crisis no es únicamente la convivencia escolar: es el pacto social que debería sostenerla.", "Y frente a eso no alcanza con preocuparse. Hace falta debatir, hace falta organizarse, hace falta construir unidad y hace falta decidir, de una vez, que nunca más un docente quede solo allí donde debería estar más acompañado que nunca."], "pullQuote": "“Cuando un docente siente que está solo frente al desborde, retrocede el Estado, retrocede la comunidad y retrocede la idea misma de lo público.”"};

    const $ = (selector) => document.querySelector(selector);
    const articleBody = $('#articleBody');
    const articleTitle = $('#articleTitle');
    const articleKicker = $('#articleKicker');
    const articleSummary = $('#articleSummary');
    const articleIntro = $('#articleIntro');
    const articleAuthor = $('#articleAuthor span');
    const articleDate = $('#articleDate span');
    const articleImage = $('#articleImage');
    const imageCaption = $('#imageCaption');
    const readingTime = $('#readingTime span');
    const progressBar = $('#progressBar');
    const sharePanel = $('#sharePanel');
    const shareFab = $('#shareFab');
    const toggleShareTop = $('#toggleShareTop');
    const closeSharePanel = $('#closeSharePanel');
    const nativeShareTop = $('#nativeShareTop');
    const toast = $('#toast');
    const commentsToggle = $('#commentsToggle');
    const commentsPanel = $('#commentsPanel');
    const commentsList = $('#commentsList');
    const openCommentModalBtn = $('#openCommentModal');
    const commentModal = $('#commentModal');
    const closeCommentModalBtn = $('#closeCommentModal');
    const cancelCommentModalBtn = $('#cancelCommentModal');
    const commentForm = $('#commentForm');
    const commentParentId = $('#commentParentId');
    const commentName = $('#commentName');
    const commentText = $('#commentText');
    const commentDialogTitle = $('#commentDialogTitle');
    const commentDialogHint = $('#commentDialogHint');
    const commentSubmitFrame = $('#commentSubmitFrame');
    const commentPostBridge = $('#commentPostBridge');
    const submitCommentBtn = $('#submitCommentBtn');
    const bridgeNoteId = $('#bridgeNoteId');
    const bridgeParentId = $('#bridgeParentId');
    const bridgeAuthor = $('#bridgeAuthor');
    const bridgeComment = $('#bridgeComment');
    const bridgeWebsite = $('#bridgeWebsite');
    const bridgeUserAgent = $('#bridgeUserAgent');

    let commentsLoaded = false;
    let commentsSubmitting = false;
    let lastCommentFrameReady = false;

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add('show');
      clearTimeout(showToast._timer);
      showToast._timer = setTimeout(() => toast.classList.remove('show'), 2400);
    }

    function setArticle() {
      articleKicker.textContent = ARTICLE_DATA.kicker;
      articleTitle.textContent = ARTICLE_DATA.title;
      articleSummary.textContent = ARTICLE_DATA.summary;
      articleAuthor.textContent = ARTICLE_DATA.author;
      articleDate.textContent = ARTICLE_DATA.date;
      readingTime.textContent = ARTICLE_DATA.readTime;
      articleIntro.textContent = ARTICLE_DATA.intro;
      articleImage.src = ARTICLE_DATA.imageSrc;
      articleImage.alt = ARTICLE_DATA.imageAlt;
      imageCaption.textContent = ARTICLE_DATA.imageCaption;

      const middleIndex = Math.max(2, Math.floor(ARTICLE_DATA.body.length / 2));
      ARTICLE_DATA.body.forEach((paragraph, index) => {
        if (index === 2) {
          const divider = document.createElement('div');
          divider.className = 'section-break';
          divider.innerHTML = '<span>Editorial</span>';
          articleBody.appendChild(divider);
        }

        if (index === middleIndex) {
          const quote = document.createElement('aside');
          quote.className = 'pull-quote';
          quote.innerHTML = `<p>${escapeHtml(ARTICLE_DATA.pullQuote)}</p>`;
          articleBody.appendChild(quote);
        }

        const p = document.createElement('p');
        p.textContent = paragraph;
        articleBody.appendChild(p);
      });
    }

    function updateProgress() {
      const scrollTop = window.scrollY || window.pageYOffset;
      const docHeight = document.documentElement.scrollHeight - window.innerHeight;
      const progress = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
      progressBar.style.width = `${Math.min(100, Math.max(0, progress))}%`;
    }

    function getShareUrls() {
      const url = encodeURIComponent(window.location.href);
      const title = encodeURIComponent(ARTICLE_DATA.title);
      return {
        whatsapp: `https://wa.me/?text=${title}%20${url}`,
        telegram: `https://t.me/share/url?url=${url}&text=${title}`,
        x: `https://twitter.com/intent/tweet?url=${url}&text=${title}`,
        facebook: `https://www.facebook.com/sharer/sharer.php?u=${url}`,
        linkedin: `https://www.linkedin.com/sharing/share-offsite/?url=${url}`,
        copy: window.location.href
      };
    }

    function openSharePanel(force) {
      const willOpen = typeof force === 'boolean' ? force : !sharePanel.classList.contains('open');
      sharePanel.classList.toggle('open', willOpen);
    }

    async function handleNativeShare() {
      if (navigator.share) {
        try {
          await navigator.share({
            title: ARTICLE_DATA.title,
            text: ARTICLE_DATA.summary,
            url: window.location.href
          });
          return;
        } catch (_) {}
      }
      openSharePanel(true);
    }

    async function handleShare(platform) {
      const urls = getShareUrls();
      if (platform === 'copy') {
        try {
          await navigator.clipboard.writeText(urls.copy);
          showToast('Enlace copiado');
        } catch (_) {
          showToast('No se pudo copiar el enlace');
        }
        return;
      }
      const target = urls[platform];
      if (target) window.open(target, '_blank', 'noopener,noreferrer');
    }

    function formatCommentDate(dateString) {
      try {
        return new Intl.DateTimeFormat('es-AR', {
          day: '2-digit',
          month: '2-digit',
          year: 'numeric',
          hour: '2-digit',
          minute: '2-digit'
        }).format(new Date(dateString));
      } catch (_) {
        return '';
      }
    }

    function commentTree(items, parentId = '') {
      return items
        .filter((item) => (item.parent_id || '') === parentId)
        .sort((a, b) => new Date(a.created_at || 0) - new Date(b.created_at || 0))
        .map((item) => ({
          ...item,
          children: commentTree(items, item.id)
        }));
    }

    function renderCommentBranch(comment) {
      const article = document.createElement('article');
      article.className = 'comment-card';

      const meta = document.createElement('div');
      meta.className = 'comment-meta';
      meta.innerHTML = `
        <span class="comment-author">${escapeHtml(comment.author || 'Anónimo')}</span>
        <span class="comment-date">${escapeHtml(formatCommentDate(comment.created_at))}</span>
      `;
      article.appendChild(meta);

      const text = document.createElement('p');
      text.className = 'comment-text';
      text.textContent = comment.comment || '';
      article.appendChild(text);

      const actions = document.createElement('div');
      actions.className = 'comment-actions';
      const replyBtn = document.createElement('button');
      replyBtn.className = 'comment-reply-btn';
      replyBtn.type = 'button';
      replyBtn.dataset.replyTo = comment.id;
      replyBtn.dataset.replyName = comment.author || 'Anónimo';
      replyBtn.innerHTML = `
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="m9 17-5-5 5-5"></path>
          <path d="M20 18v-2a4 4 0 0 0-4-4H4"></path>
        </svg>
        Responder
      `;
      actions.appendChild(replyBtn);
      article.appendChild(actions);

      if (comment.children && comment.children.length) {
        const children = document.createElement('div');
        children.className = 'comment-children';
        comment.children.forEach((child) => children.appendChild(renderCommentBranch(child)));
        article.appendChild(children);
      }

      return article;
    }

    function updateCommentsToggle(count) {
      const label = count > 0 ? `Ver comentarios... (${count})` : 'Ver comentarios...';
      const labelNode = document.getElementById('commentsToggleLabel');
      labelNode.innerHTML = `
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
        </svg>
        ${label}
      `;
    }

    function renderComments(items) {
      commentsList.innerHTML = '';
      updateCommentsToggle(items.length);

      if (!items.length) {
        commentsList.innerHTML = '<p class="empty-comments">Todavía no hay comentarios publicados.</p>';
        return;
      }

      const tree = commentTree(items);
      tree.forEach((comment) => commentsList.appendChild(renderCommentBranch(comment)));
    }

    function renderCommentsStatus(message) {
      commentsList.innerHTML = `<p class="status-note">${escapeHtml(message)}</p>`;
    }

    function loadComments() {
      return new Promise((resolve) => {
        if (!COMMENTS_API_URL || COMMENTS_API_URL.includes('PEGAR_AQUI')) {
          renderComments([]);
          resolve([]);
          return;
        }

        const callbackName = `commentsCallback_${Date.now()}_${Math.floor(Math.random() * 100000)}`;
        const script = document.createElement('script');
        const cleanup = () => {
          delete window[callbackName];
          script.remove();
        };

        window[callbackName] = (payload) => {
          cleanup();
          const items = payload && Array.isArray(payload.comments) ? payload.comments : [];
          renderComments(items);
          commentsLoaded = true;
          resolve(items);
        };

        script.onerror = () => {
          cleanup();
          renderCommentsStatus('No se pudieron cargar los comentarios en este momento.');
          resolve([]);
        };

        const url = new URL(COMMENTS_API_URL);
        url.searchParams.set('action', 'list');
        url.searchParams.set('note_id', NOTE_ID);
        url.searchParams.set('callback', callbackName);
        url.searchParams.set('t', String(Date.now()));

        script.src = url.toString();
        document.body.appendChild(script);
      });
    }

    function openCommentModal(parentId = '', replyName = '') {
      commentParentId.value = parentId;
      commentDialogTitle.textContent = parentId ? 'Responder comentario' : 'Comentar';
      commentDialogHint.textContent = parentId ? `Tu respuesta se publicará debajo del comentario de ${replyName}.` : 'Tu comentario se publica en esta nota.';
      commentModal.hidden = false;
      document.body.style.overflow = 'hidden';
      setTimeout(() => commentName.focus(), 30);
    }

    function closeCommentModal() {
      commentModal.hidden = true;
      document.body.style.overflow = '';
      commentParentId.value = '';
      commentDialogTitle.textContent = 'Comentar';
      commentDialogHint.textContent = 'Tu comentario se publica en esta nota.';
      commentForm.reset();
      commentParentId.value = '';
    }

    function submitComment() {
      if (!COMMENTS_API_URL || COMMENTS_API_URL.includes('PEGAR_AQUI')) {
        showToast('Falta conectar la URL del backend de comentarios');
        return;
      }

      const author = commentName.value.trim();
      const comment = commentText.value.trim();
      const parentId = commentParentId.value.trim();
      const website = document.getElementById('commentWebsite').value.trim();

      if (author.length < 2) {
        showToast('Escribí un nombre válido');
        commentName.focus();
        return;
      }

      if (comment.length < 3) {
        showToast('Escribí un comentario más largo');
        commentText.focus();
        return;
      }

      commentsSubmitting = true;
      submitCommentBtn.disabled = true;
      submitCommentBtn.textContent = 'Publicando...';

      commentPostBridge.action = COMMENTS_API_URL;
      bridgeNoteId.value = NOTE_ID;
      bridgeParentId.value = parentId;
      bridgeAuthor.value = author;
      bridgeComment.value = comment;
      bridgeWebsite.value = website;
      bridgeUserAgent.value = navigator.userAgent.slice(0, 350);

      commentPostBridge.submit();

      closeCommentModal();
      showToast('Comentario enviado');
      setTimeout(() => {
        loadComments().then(() => {
          commentsSubmitting = false;
          submitCommentBtn.disabled = false;
          submitCommentBtn.textContent = 'Publicar comentario';
        });
      }, 1300);
    }

    setArticle();
    renderComments([]);

    window.addEventListener('scroll', updateProgress, { passive: true });
    window.addEventListener('load', updateProgress);

    nativeShareTop.addEventListener('click', handleNativeShare);
    shareFab.addEventListener('click', () => openSharePanel());
    toggleShareTop.addEventListener('click', () => openSharePanel(true));
    closeSharePanel.addEventListener('click', () => openSharePanel(false));

    document.querySelectorAll('.share-action').forEach((btn) => {
      btn.addEventListener('click', () => handleShare(btn.dataset.platform));
    });

    document.addEventListener('click', (event) => {
      if (
        sharePanel.classList.contains('open') &&
        !sharePanel.contains(event.target) &&
        !shareFab.contains(event.target) &&
        !toggleShareTop.contains(event.target)
      ) {
        openSharePanel(false);
      }
    });

    commentsToggle.addEventListener('click', async () => {
      const willOpen = commentsPanel.hidden;
      commentsPanel.hidden = !commentsPanel.hidden;
      commentsToggle.setAttribute('aria-expanded', String(willOpen));
      if (willOpen && !commentsLoaded) {
        await loadComments();
      }
    });

    openCommentModalBtn.addEventListener('click', () => openCommentModal());
    closeCommentModalBtn.addEventListener('click', closeCommentModal);
    cancelCommentModalBtn.addEventListener('click', closeCommentModal);

    commentForm.addEventListener('submit', (event) => {
      event.preventDefault();
      submitComment();
    });

    commentsList.addEventListener('click', (event) => {
      const replyBtn = event.target.closest('[data-reply-to]');
      if (!replyBtn) return;
      openCommentModal(replyBtn.dataset.replyTo || '', replyBtn.dataset.replyName || 'este comentario');
    });

    commentModal.addEventListener('click', (event) => {
      if (event.target === commentModal) {
        closeCommentModal();
      }
    });

    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') {
        if (!commentModal.hidden) closeCommentModal();
        if (sharePanel.classList.contains('open')) openSharePanel(false);
      }
    });
  </script>
</body>
</html>
